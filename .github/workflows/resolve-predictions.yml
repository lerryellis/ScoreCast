name: Resolve Predictions

on:
  schedule:
    # Every 15 mins between 13:00–22:00 UTC (covers all European kickoffs)
    - cron: '*/15 13-22 * * *'
  workflow_dispatch:  # allow manual trigger from GitHub Actions tab

jobs:
  resolve:
    runs-on: ubuntu-latest
    steps:
      - name: Run resolver
        run: |
          RESPONSE=$(curl -s -X POST \
            "https://scorecast.up.railway.app/api/admin/resolve?admin_key=${{ secrets.ADMIN_KEY }}")
          echo "Resolver response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"resolved"' || exit 1
