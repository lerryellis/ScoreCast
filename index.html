<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScoreCast — AI Score Predictions</title>
<style>
  :root {
    --bg:        #080c14;
    --surface:   #0f1623;
    --card:      #141d2e;
    --border:    #1e2d45;
    --accent:    #00d4ff;
    --green:     #00e676;
    --orange:    #ff9100;
    --red:       #ff4444;
    --yellow:    #ffd740;
    --muted:     #4a5568;
    --text:      #e2e8f0;
    --subtext:   #718096;
    --football:  #00e676;
    --basketball:#ff9100;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
  }

  /* ── Nav ── */
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
    height: 64px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    -webkit-backdrop-filter: blur(10px);
    backdrop-filter: blur(10px);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  .logo-icon { font-size: 24px; }
  .logo span.b { color: var(--accent); }
  .logo span.s { color: var(--green); }

  .nav-tabs {
    display: flex;
    gap: 4px;
    background: var(--card);
    border-radius: 10px;
    padding: 4px;
  }
  .nav-tab {
    padding: 8px 20px;
    border-radius: 7px;
    border: none;
    background: transparent;
    color: var(--subtext);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .nav-tab.active { background: var(--border); color: var(--text); }
  .nav-tab.football.active { color: var(--football); }
  .nav-tab.basketball.active { color: var(--basketball); }

  .nav-right { display: flex; align-items: center; gap: 14px; }
  .date-badge {
    font-size: 13px;
    color: var(--subtext);
    background: var(--card);
    padding: 6px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .refresh-btn {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 8px 18px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .refresh-btn:hover { opacity: 0.85; }
  .refresh-btn.loading { opacity: 0.6; pointer-events: none; }

  /* ── Main Layout ── */
  main { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }

  /* ── Sport title row ── */
  .sport-title-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
  }
  .sport-icon { font-size: 32px; }
  .sport-title-row h1 { font-size: 26px; font-weight: 800; }
  .sport-title-row p  { font-size: 13px; color: var(--subtext); margin-top: 2px; }

  /* ── Flashcard carousel ── */
  .flashcard-wrap {
    position: relative;
    width: 100%;
    height: 160px;
    margin-top: 16px;
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    background: var(--card);
    border: 1px solid var(--border);
  }
  .flashcard {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 32px;
    opacity: 0;
    transition: opacity 0.6s ease;
    background: linear-gradient(135deg, #0d1b2e 0%, #0f2744 60%, #0d1b2e 100%);
  }
  .flashcard.active { opacity: 1; }
  .flashcard-league {
    position: absolute;
    top: 14px; left: 32px;
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .flashcard-time {
    position: absolute;
    top: 14px; right: 32px;
    font-size: 11px;
    color: var(--subtext);
  }
  .flashcard-team {
    flex: 1;
    font-size: 20px;
    font-weight: 800;
    color: var(--text);
    line-height: 1.2;
  }
  .flashcard-team.home { text-align: left; }
  .flashcard-team.away { text-align: right; }
  .flashcard-score-block {
    flex: 0 0 auto;
    text-align: center;
    padding: 0 24px;
  }
  .flashcard-score {
    font-size: 36px;
    font-weight: 900;
    color: var(--football);
    letter-spacing: 2px;
  }
  .flashcard-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.5px;
    margin-top: 2px;
  }
  .flashcard-dots {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 5px;
  }
  .flashcard-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.3s;
  }
  .flashcard-dot.active { background: var(--accent); }
  .flashcard-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--muted);
    font-size: 13px;
  }

  /* ── Controls + Calendar row ── */
  .controls-calendar-row {
    display: grid;
    grid-template-columns: 1fr 300px;
    gap: 20px;
    margin-bottom: 28px;
    align-items: start;
  }

  .controls-panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .select-group { display: flex; flex-direction: column; gap: 6px; }
  .select-group label {
    font-size: 11px;
    font-weight: 700;
    color: var(--subtext);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .select-group select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 14px;
    cursor: pointer;
    outline: none;
    width: 100%;
    transition: border-color 0.2s;
  }
  .select-group select:focus { border-color: var(--accent); }

  /* ── Calendar ── */
  .calendar-panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
  }
  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .cal-title { font-size: 14px; font-weight: 700; }
  .cal-nav-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    width: 30px;
    height: 30px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s;
  }
  .cal-nav-btn:hover { border-color: var(--accent); }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
  }
  .cal-day-label {
    text-align: center;
    font-size: 10px;
    font-weight: 700;
    color: var(--subtext);
    padding: 4px 0 8px;
    text-transform: uppercase;
  }
  .cal-day {
    text-align: center;
    padding: 7px 2px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.15s;
    color: var(--text);
  }
  .cal-day:not(.empty):hover { background: var(--border); }
  .cal-day.today { color: var(--accent); font-weight: 700; }
  .cal-day.selected { background: var(--accent) !important; color: #000 !important; font-weight: 700; }
  .cal-day.empty { cursor: default; }
  .cal-day.other-month { color: var(--muted); }
  .cal-day.has-games { position: relative; }
  .cal-day.has-games::after {
    content: '';
    position: absolute;
    bottom: 3px;
    left: 50%;
    transform: translateX(-50%);
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--football);
  }
  .cal-day.selected.has-games::after { background: #000; }
  .cal-selected-label {
    margin-top: 14px;
    text-align: center;
    font-size: 11px;
    color: var(--subtext);
  }
  .cal-selected-label strong { color: var(--accent); }

  /* ── Match Cards Grid ── */
  .matches-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(480px, 1fr));
    gap: 20px;
  }

  /* ── Match Card ── */
  .match-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
    animation: fadeUp 0.35s ease both;
  }
  .match-card:hover { transform: translateY(-2px); border-color: var(--accent); }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 18px;
    background: rgba(255,255,255,0.03);
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    color: var(--subtext);
  }
  .card-header .league-name { font-weight: 600; letter-spacing: 0.3px; }
  .match-time {
    background: var(--border);
    padding: 3px 10px;
    border-radius: 6px;
    font-weight: 600;
    color: var(--text);
  }

  .card-body { padding: 22px 18px 18px; }

  /* Score row */
  .score-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .team { display: flex; flex-direction: column; }
  .team.home { align-items: flex-start; }
  .team.away { align-items: flex-end; }
  .team-logo {
    width: 36px; height: 36px;
    object-fit: contain;
    margin-bottom: 6px;
    filter: drop-shadow(0 1px 3px rgba(0,0,0,0.4));
  }
  .team-logo-placeholder {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--border);
    margin-bottom: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .team-name { font-size: 15px; font-weight: 700; line-height: 1.2; }
  .team-badge { font-size: 11px; color: var(--subtext); margin-top: 2px; }

  .score-display { display: flex; align-items: center; gap: 10px; }
  .score-box {
    width: 56px; height: 56px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: 900;
    border: 2px solid var(--border);
    transition: border-color 0.3s;
  }
  .score-box.football   { border-color: var(--football);   color: var(--football);   background: rgba(0,230,118,0.07); }
  .score-box.basketball { border-color: var(--basketball); color: var(--basketball); background: rgba(255,145,0,0.07); }
  .score-sep { font-size: 22px; color: var(--muted); font-weight: 900; }

  /* Probability bar */
  .prob-bar-wrap { margin-bottom: 16px; }
  .prob-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--subtext); margin-bottom: 5px; }
  .prob-bar { height: 6px; border-radius: 4px; background: var(--border); overflow: hidden; display: flex; }
  .prob-win  { background: var(--green);  transition: width 0.8s ease; }
  .prob-draw { background: var(--yellow); transition: width 0.8s ease; }
  .prob-loss { background: var(--red);    transition: width 0.8s ease; }

  /* Stats row */
  .stats-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .stat-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 5px 10px;
    font-size: 11px;
    color: var(--subtext);
  }
  .stat-chip strong { color: var(--text); }

  /* Scorelines */
  .scorelines { display: flex; gap: 6px; flex-wrap: wrap; }
  .scoreline-chip {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 11px;
    font-weight: 700;
    color: var(--text);
  }
  .scoreline-chip.top { border-color: var(--accent); color: var(--accent); }
  .scoreline-label { font-size: 11px; color: var(--subtext); margin-bottom: 6px; font-weight: 600; letter-spacing: 0.3px; }

  /* Safe bet + scorelines layout */
  .scorelines-safe-row {
    display: flex;
    gap: 20px;
    align-items: flex-start;
    flex-wrap: wrap;
  }
  .scorelines-col { flex: 1; min-width: 180px; }
  .safe-bet-col {
    min-width: 160px;
    background: rgba(0, 230, 118, 0.06);
    border: 1px solid rgba(0, 230, 118, 0.25);
    border-radius: 10px;
    padding: 10px 14px;
  }
  .safe-bet-label {
    font-size: 10px;
    color: var(--green);
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .safe-bet-line {
    font-size: 20px;
    font-weight: 800;
    color: var(--green);
    line-height: 1;
  }
  .safe-bet-prob {
    font-size: 12px;
    color: var(--subtext);
    margin-top: 4px;
  }
  .safe-bet-last-h2h {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid rgba(255,255,255,0.08);
    font-size: 11px;
    color: var(--subtext);
  }
  .safe-bet-last-h2h strong { color: var(--text); }

  /* Form + H2H section */
  .form-h2h-section {
    margin-top: 16px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }
  .form-h2h-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }
  .form-block h4 {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--subtext);
    margin-bottom: 7px;
  }
  .form-dots { display: flex; gap: 5px; flex-wrap: wrap; }
  .form-dot {
    width: 28px; height: 28px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700;
    cursor: default;
    position: relative;
  }
  .form-dot.W { background: rgba(0,230,118,0.15); color: var(--green); border: 1px solid rgba(0,230,118,0.3); }
  .form-dot.D { background: rgba(255,215,64,0.15); color: var(--yellow); border: 1px solid rgba(255,215,64,0.3); }
  .form-dot.L { background: rgba(255,68,68,0.15); color: var(--red); border: 1px solid rgba(255,68,68,0.3); }
  .form-dot span.score-tip {
    position: absolute;
    bottom: 32px; left: 50%; transform: translateX(-50%);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 7px;
    font-size: 10px;
    white-space: nowrap;
    display: none;
    z-index: 10;
  }
  .form-dot:hover span.score-tip { display: block; }

  .h2h-block h4 {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--subtext);
    margin-bottom: 7px;
  }
  .h2h-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 5px 8px;
    border-radius: 6px;
    font-size: 11px;
    background: rgba(255,255,255,0.02);
    margin-bottom: 3px;
  }
  .h2h-row .h2h-score {
    font-weight: 800;
    color: var(--accent);
    font-size: 12px;
  }
  .h2h-row .h2h-teams { color: var(--subtext); flex: 1; padding: 0 8px; font-size: 10px; }
  .h2h-pred { font-size: 11px; font-weight: 700; color: var(--yellow); white-space: nowrap; margin-left: 8px; }
  .h2h-pred-label { font-size: 9px; color: var(--muted); font-weight: 400; margin-right: 3px; }

  /* Confidence badge */
  .confidence-badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 700;
    background: rgba(0,212,255,0.1); color: var(--accent);
    border: 1px solid rgba(0,212,255,0.2);
    float: right;
  }

  /* ── Team Schedule View ── */
  .team-schedule-wrap { margin-top: 0; }
  .team-schedule-wrap h2 {
    font-size: 18px; font-weight: 800;
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 10px;
  }
  .back-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--subtext);
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .back-btn:hover { border-color: var(--accent); color: var(--text); }

  .schedule-section-label {
    font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--subtext); margin: 20px 0 10px;
  }
  .schedule-row {
    display: grid;
    grid-template-columns: 90px 1fr auto auto;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    border-radius: 10px;
    background: var(--card);
    border: 1px solid var(--border);
    margin-bottom: 6px;
    font-size: 13px;
    transition: border-color 0.2s;
  }
  .schedule-row:hover { border-color: var(--accent); }
  .schedule-row .sr-date { color: var(--subtext); font-size: 12px; }
  .schedule-row .sr-teams { font-weight: 600; }
  .schedule-row .sr-score {
    font-weight: 800; font-size: 15px;
    color: var(--accent); text-align: right; min-width: 50px;
  }
  .schedule-row .sr-result {
    font-size: 11px; font-weight: 700;
    padding: 3px 8px; border-radius: 6px; text-align: center; min-width: 28px;
  }
  .sr-result.W { background: rgba(0,230,118,0.15); color: var(--green); }
  .sr-result.D { background: rgba(255,215,64,0.15); color: var(--yellow); }
  .sr-result.L { background: rgba(255,68,68,0.15); color: var(--red); }
  .sr-result.upcoming { background: rgba(0,212,255,0.1); color: var(--accent); font-size: 10px; padding: 3px 6px; }

  /* ── Empty / Loading / Error states ── */
  .state-box {
    text-align: center; padding: 80px 24px; color: var(--subtext);
  }
  .state-box .icon { font-size: 48px; margin-bottom: 16px; }
  .state-box h3 { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
  .state-box p  { font-size: 14px; max-width: 360px; margin: 0 auto; }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .hidden { display: none; }

  /* ── Live Score Tickers ── */
  #tickerContainer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 200;
    display: flex;
    flex-direction: column;
  }
  .ticker-row {
    height: 36px;
    background: #080c14f0;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    overflow: hidden;
    -webkit-backdrop-filter: blur(8px);
    backdrop-filter: blur(8px);
  }
  #tickerLive   { background: #0a0e18f0; }
  #tickerFinal  { background: #080c14f0; border-top-color: #1a2a1a; }
  .ticker-label {
    flex-shrink: 0;
    padding: 0 12px;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 1px;
    border-right: 1px solid var(--border);
    height: 100%;
    display: flex; align-items: center;
    background: var(--surface);
    white-space: nowrap;
  }
  .ticker-label.live  { color: var(--red); }
  .ticker-label.final { color: var(--green); }
  .ticker-track-wrap {
    flex: 1;
    overflow: hidden;
    height: 100%;
    position: relative;
  }
  .ticker-track {
    display: flex;
    align-items: center;
    height: 100%;
    white-space: nowrap;
    animation: ticker-scroll 40s linear infinite;
    will-change: transform;
  }
  .ticker-track:hover { animation-play-state: paused; }
  @keyframes ticker-scroll {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  .ticker-item {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 0 20px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    border-right: 1px solid var(--border);
  }
  .ticker-item .t-sport { font-size: 13px; }
  .ticker-item .t-score { color: var(--accent); font-weight: 800; }
  .ticker-item .t-score.live { color: var(--red); }
  .ticker-item .t-league { font-size: 10px; color: var(--subtext); }
  .ticker-item .t-status { font-size: 10px; color: var(--red); font-weight: 700; animation: blink 1s step-start infinite; }
  .ticker-item .t-ft     { font-size: 10px; color: var(--green); font-weight: 700; }
  @keyframes blink { 50% { opacity: 0; } }
  body { padding-bottom: 72px; }

  /* ── Match Detail Modal ── */
  #matchModal {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 500;
    background: rgba(0,0,0,0.82);

  .modal-close:hover { color: var(--text); }
  .modal-league-row {

    gap: 10px;

  .modal-venue { font-size: 11px; color: var(--muted); }
  .modal-teams-row {

  .modal-team {

  .modal-team img { width: 64px; height: 64px; object-fit: contain; }
  .modal-team-name { font-size: 18px; font-weight: 700; text-align: center; }
  .modal-team-badge { font-size: 10px; color: var(--subtext); font-weight: 600; letter-spacing: 0.5px; }
  .modal-score-center {
    display: flex;

  .modal-score-boxes {

  .modal-score-box {
    width: 72px; height: 72px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px; font-weight: 900;

  .modal-score-box.football   { border: 2px solid var(--football);   color: var(--football);   background: rgba(0,230,118,0.07); }
  .modal-score-box.basketball { border: 2px solid var(--basketball); color: var(--basketball); background: rgba(255,145,0,0.07); }
  .modal-score-sep { font-size: 26px; color: var(--muted); font-weight: 900; }
  .modal-status { font-size: 11px; color: var(--subtext); }

  /* Half Time section */
  .ht-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 20px;
  }
  .ht-section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;

    margin-bottom: 14px;

  .ht-row {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;

  .ht-col {
    flex: 1;
    min-width: 160px;

  .ht-col-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.4px;
    color: var(--subtext);

  .ht-score-row {
    display: flex;
    align-items: center;
    gap: 8px;

    width: 48px; height: 48px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 900;
    border: 1px solid var(--border);
    color: var(--text);
    background: rgba(255,255,255,0.04);
  }
  .ht-score-box.actual { border-color: var(--yellow); color: var(--yellow); background: rgba(255,215,64,0.07); }
  .ht-score-box.pred   { border-color: var(--accent);  color: var(--accent);  background: rgba(0,212,255,0.07); }
  .ht-sep { font-size: 18px; color: var(--muted); font-weight: 900; }
  .ht-na { font-size: 13px; color: var(--muted); font-style: italic; }

  /* Make existing card content reusable in modal */

    font-size: 11px; font-weight: 700; letter-spacing: 0.4px;

  /* ── Responsive ── */
  @media (max-width: 820px) {
    .controls-calendar-row { grid-template-columns: 1fr; }

  @media (max-width: 640px) {
    .matches-grid { grid-template-columns: 1fr; }
    nav { padding: 0 16px; }
    .nav-tabs .nav-tab span.label { display: none; }
  }
</style>
</head>
<body>

<!-- Navigation -->
<nav>
  <div class="logo">
    <span class="logo-icon">🎯</span>
    <div><span class="b">Score</span><span class="s">Cast</span></div>
  </div>

  <div class="nav-tabs">
    <button type="button" class="nav-tab football active" onclick="switchSport('football')">
      ⚽ <span class="label">Football</span>
    </button>
    <button type="button" class="nav-tab basketball" onclick="switchSport('basketball')">
      🏀 <span class="label">Basketball</span>
    </button>
  </div>

  <div class="nav-right">
    <div class="date-badge" id="dateBadge"></div>
    <button type="button" class="refresh-btn" id="refreshBtn" onclick="loadPredictions()">
      <span id="refreshIcon">↻</span> Refresh
    </button>
  </div>
</nav>

<!-- Main -->
<main>

  <!-- ── Football View ── -->
  <div id="footballView">
    <div class="sport-title-row">
      <span class="sport-icon">⚽</span>
      <div>
        <h1>Football Predictions</h1>
        <p>Dixon-Coles Poisson model · ESPN live data · Updated every 30 minutes</p>
      </div>
    </div>

    <!-- Controls + Calendar -->
    <div class="controls-calendar-row">
      <div class="controls-panel">
        <div class="select-group">
          <label>League</label>
          <select id="leagueSelect" title="Select league" onchange="onLeagueChange()">
            <option>Premier League</option>
            <option>Championship</option>
            <option>La Liga</option>
            <option>Serie A</option>
            <option>Bundesliga</option>
            <option>Ligue 1</option>
            <option>Champions League</option>
            <option>Europa League</option>
            <option>Ghana Premier League</option>
          </select>
        </div>
        <div class="select-group">
          <label>Team</label>
          <select id="teamSelect" title="Select team" onchange="onTeamChange()">
            <option value="">All Teams</option>
          </select>
        </div>

        <!-- Flashcard carousel -->
        <div class="flashcard-wrap" id="flashcardWrap">
          <div class="flashcard-empty">Loading upcoming matches…</div>
        </div>
      </div>

      <!-- Calendar -->
      <div class="calendar-panel" id="calendarPanel"></div>
    </div>

    <!-- Match grid OR team schedule -->
    <div id="footballGrid" class="matches-grid"></div>
    <div id="teamScheduleWrap" class="hidden"></div>
  </div>

  <!-- ── Basketball View ── -->
  <div id="basketballView" class="hidden">
    <div class="sport-title-row">
      <span class="sport-icon">🏀</span>
      <div>
        <h1>NBA Predictions</h1>
        <p>XGBoost regression model · Live NBA data</p>
      </div>
    </div>
    <div id="basketballGrid" class="matches-grid"></div>
  </div>

</main>

<script>
  // ── State ─────────────────────────────────────────────────────────────────
  let currentSport   = 'football';
  let selectedDate   = new Date();
  let calendarDate   = new Date();
  let loadedMatches  = [];   // cache for team dropdown population
  let fixtureDates   = new Set();  // ISO dates with games for selected league+month

  // ── Date badge ────────────────────────────────────────────────────────────
  document.getElementById('dateBadge').textContent =
    new Date().toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short', year:'numeric' });

  // ── Calendar ──────────────────────────────────────────────────────────────
  const MONTHS = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];
  const DAYS   = ['Mo','Tu','We','Th','Fr','Sa','Su'];

  function formatISO(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function renderCalendar() {
    const year  = calendarDate.getFullYear();
    const month = calendarDate.getMonth();
    const today = new Date(); today.setHours(0,0,0,0);
    const sel   = new Date(selectedDate); sel.setHours(0,0,0,0);
    const first = new Date(year, month, 1);
    const last  = new Date(year, month + 1, 0);
    let startDow = (first.getDay() + 6) % 7; // Mon=0

    let html = `
      <div class="cal-header">
        <button class="cal-nav-btn" onclick="calPrev()">&#9664;</button>
        <span class="cal-title">${MONTHS[month]} ${year}</span>
        <button class="cal-nav-btn" onclick="calNext()">&#9654;</button>
      </div>
      <div class="cal-grid">
        ${DAYS.map(d => `<div class="cal-day-label">${d}</div>`).join('')}
    `;

    for (let i = 0; i < startDow; i++) html += `<div class="cal-day empty"></div>`;

    for (let d = 1; d <= last.getDate(); d++) {
      const dt = new Date(year, month, d); dt.setHours(0,0,0,0);
      const isoStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      let cls = '';
      if (dt.getTime() === sel.getTime()) cls = 'selected';
      else if (dt.getTime() === today.getTime()) cls = 'today';
      if (fixtureDates.has(isoStr)) cls += ' has-games';
      html += `<div class="cal-day ${cls}" onclick="onDateClick('${isoStr}')">${d}</div>`;
    }
    html += `</div>`;

    const selLabel = sel.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short' });
    html += `<div class="cal-selected-label">Showing: <strong>${selLabel}</strong></div>`;

    document.getElementById('calendarPanel').innerHTML = html;
  }

  async function fetchFixtureDates() {
    if (currentSport !== 'football') return;
    const league = document.getElementById('leagueSelect').value;
    const year   = calendarDate.getFullYear();
    const month  = calendarDate.getMonth() + 1;
    try {
      const res  = await fetch(`/api/football/fixture-dates?league=${encodeURIComponent(league)}&year=${year}&month=${month}`);
      const data = await res.json();
      fixtureDates = new Set(data.dates || []);
    } catch { fixtureDates = new Set(); }
    renderCalendar();
  }

  function calPrev() { calendarDate.setMonth(calendarDate.getMonth()-1); fetchFixtureDates(); }
  function calNext() { calendarDate.setMonth(calendarDate.getMonth()+1); fetchFixtureDates(); }

  function onDateClick(iso) {
    selectedDate = new Date(iso + 'T12:00:00');
    // Reset team select back to all
    document.getElementById('teamSelect').value = '';
    document.getElementById('teamScheduleWrap').style.display = 'none';
    document.getElementById('footballGrid').style.display = '';
    renderCalendar();
    loadPredictions();
  }

  // ── Sport / League switching ───────────────────────────────────────────────
  function switchSport(sport) {
    currentSport = sport;
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.querySelector(`.nav-tab.${sport}`).classList.add('active');
    document.getElementById('footballView').style.display   = sport === 'football'   ? '' : 'none';
    document.getElementById('basketballView').style.display = sport === 'basketball' ? '' : 'none';
    refreshTickerDisplay();
    loadPredictions();
  }

  function onLeagueChange() {
    // Reset team select when league changes
    const sel = document.getElementById('teamSelect');
    sel.innerHTML = '<option value="">All Teams</option>';
    document.getElementById('teamScheduleWrap').style.display = 'none';
    document.getElementById('footballGrid').style.display = '';
    fetchFixtureDates();
    loadPredictions();
  }

  // ── Team Dropdown ─────────────────────────────────────────────────────────
  function populateTeamDropdown(matches) {
    const sel    = document.getElementById('teamSelect');
    const prevVal = sel.value;
    const teams  = new Map();
    matches.forEach(m => {
      if (!teams.has(m.home_team)) teams.set(m.home_team, { id: m.home_team_id, slug: m.league_slug });
      if (!teams.has(m.away_team)) teams.set(m.away_team, { id: m.away_team_id, slug: m.league_slug });
    });
    sel.innerHTML = '<option value="">All Teams</option>';
    [...teams.entries()].sort((a,b) => a[0].localeCompare(b[0])).forEach(([name, info]) => {
      const opt = document.createElement('option');
      opt.value = JSON.stringify({ name, id: info.id, slug: info.slug });
      opt.textContent = name;
      sel.appendChild(opt);
    });
    if (prevVal) sel.value = prevVal;
  }

  function onTeamChange() {
    const val = document.getElementById('teamSelect').value;
    document.getElementById('teamScheduleWrap').style.display = 'none';
    document.getElementById('footballGrid').style.display = '';
    if (!val) {
      renderFootball(loadedMatches);
      return;
    }
    const { id } = JSON.parse(val);
    const filtered = loadedMatches.filter(m =>
      String(m.home_team_id) === String(id) || String(m.away_team_id) === String(id)
    );
    renderFootball(filtered);
  }

  // ── Loading / Error / Empty states ────────────────────────────────────────
  function setLoading(gridId) {
    document.getElementById(gridId).innerHTML = `
      <div class="state-box" style="grid-column:1/-1;">
        <div class="spinner"></div>
        <h3>Loading predictions…</h3>
        <p>Fetching fixtures and computing scores</p>
      </div>`;
  }

  function setError(gridId, msg) {
    document.getElementById(gridId).innerHTML = `
      <div class="state-box" style="grid-column:1/-1;">
        <div class="icon">⚠️</div>
        <h3>Could not load predictions</h3>
        <p>${msg}</p>
      </div>`;
  }

  function setEmpty(gridId, sport, dateStr) {
    document.getElementById(gridId).innerHTML = `
      <div class="state-box" style="grid-column:1/-1;">
        <div class="icon">${sport === 'football' ? '⚽' : '🏀'}</div>
        <h3>No games on ${dateStr}</h3>
        <p>There are no scheduled ${sport} matches for this date in the selected league. Try another date on the calendar.</p>
      </div>`;
  }

  // ── Load Predictions ──────────────────────────────────────────────────────
  async function loadPredictions() {
    const btn  = document.getElementById('refreshBtn');
    const icon = document.getElementById('refreshIcon');
    btn.classList.add('loading');
    icon.textContent = '⟳';

    if (currentSport === 'football') {
      const league  = document.getElementById('leagueSelect').value;
      const dateStr = formatISO(selectedDate);
      setLoading('footballGrid');
      try {
        const res  = await fetch(`/api/predictions/football?league=${encodeURIComponent(league)}&date=${dateStr}`);
        const data = await res.json();
        loadedMatches = data.matches || [];
        loadedMatches.forEach(m => { _allMatches[m.fixture_id] = m; });
        populateTeamDropdown(loadedMatches);
        if (!loadedMatches.length) {
          setEmpty('footballGrid', 'football', selectedDate.toLocaleDateString('en-GB', {day:'numeric',month:'short'}));
        } else {
          renderFootball(loadedMatches);
        }
      } catch(e) {
        setError('footballGrid', 'Could not reach the server. Is it running?');
      }
    } else {
      setLoading('basketballGrid');
      try {
        const res  = await fetch('/api/predictions/basketball');
        const data = await res.json();
        const bMatches = data.matches || [];
        bMatches.forEach(m => { _allMatches[m.game_id] = { ...m, status_bball: m.status }; });
        renderBasketball(bMatches);
      } catch(e) {
        setError('basketballGrid', 'Could not reach the NBA data source.');
      }
    }

    btn.classList.remove('loading');
    icon.textContent = '↻';
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function formatTime(isoString) {
    if (!isoString) return '—';
    try {
      return new Date(isoString).toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
    } catch { return '—'; }
  }

  function formatShortDate(isoString) {
    if (!isoString) return '—';
    try {
      return new Date(isoString).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'2-digit' });
    } catch { return '—'; }
  }

  function probBar(winP, drawP, lossP) {
    return `
      <div class="prob-bar-wrap">
        <div class="prob-labels">
          <span>Home ${winP}%</span>
          ${drawP !== undefined ? `<span>Draw ${drawP}%</span>` : ''}
          <span>Away ${lossP}%</span>
        </div>
        <div class="prob-bar">
          <div class="prob-win"  style="width:${winP}%"></div>
          ${drawP !== undefined ? `<div class="prob-draw" style="width:${drawP}%"></div>` : ''}
          <div class="prob-loss" style="width:${lossP}%"></div>
        </div>
      </div>`;
  }

  function formResult(gf, ga) {
    if (gf > ga) return 'W';
    if (gf === ga) return 'D';
    return 'L';
  }

  function buildFormDots(matches, teamLabel) {
    if (!matches || !matches.length) return '<span style="color:var(--muted);font-size:11px">No data</span>';
    return matches.map(m => {
      const res = formResult(m.goals_for, m.goals_ag);
      return `<div class="form-dot ${res}">${res}<span class="score-tip">${m.goals_for}-${m.goals_ag}</span></div>`;
    }).join('');
  }

  function buildH2H(h2h, homeTeam, awayTeam, prediction, features) {
    if (!h2h || !h2h.length) return '<span style="color:var(--muted);font-size:11px">No H2H data</span>';

    // Poisson mode = floor(lambda), minimum 0
    const pMode = l => Math.max(0, Math.floor(l));
    const HOME_ADV = 1.1;

    return h2h.map(g => {
      const date = formatShortDate(g.date);
      let predHtml = '';
      if (features) {
        let lh, la;
        if (g.fixture_home_at_home !== false) {
          // Current home team was home in this past match — use lambdas as-is
          lh = features.lambda_home;
          la = features.lambda_away;
        } else {
          // Teams were reversed: away team was at home
          // Strip home advantage from lambda_home, apply it to lambda_away
          lh = features.lambda_away * HOME_ADV;
          la = features.lambda_home / HOME_ADV;
        }
        predHtml = `<span class="h2h-pred"><span class="h2h-pred-label">pred</span>${pMode(lh)}–${pMode(la)}</span>`;
      }
      return `
        <div class="h2h-row">
          <span style="color:var(--subtext);font-size:10px">${date}</span>
          <span class="h2h-teams">${g.home_team} vs ${g.away_team}</span>
          <span class="h2h-score">${g.home_goals}–${g.away_goals}</span>
          ${predHtml}
        </div>`;
    }).join('');
  }

  // ── Render Football ───────────────────────────────────────────────────────
  function renderFootball(matches) {
    const grid = document.getElementById('footballGrid');
    if (!matches.length) { setEmpty('footballGrid', 'football', selectedDate.toLocaleDateString('en-GB', {day:'numeric',month:'short'})); return; }

    grid.innerHTML = matches.map((m, i) => {
      const p    = m.prediction;
      const f    = m.features;
      const delay = i * 0.05;

      return `
        <div class="match-card" style="animation-delay:${delay}s;cursor:pointer" onclick="openMatchModal('${m.fixture_id}')">
          <div class="card-header">
            <span class="league-name">⚽ ${m.league}</span>
            <span class="match-time">${formatTime(m.match_time)}</span>
          </div>
          <div class="card-body">
            <div class="score-row">
              <div class="team home">
                ${m.home_team_logo
                  ? `<img class="team-logo" src="${m.home_team_logo}" alt="${m.home_team}" onerror="this.style.display='none'">`
                  : `<div class="team-logo-placeholder">⚽</div>`}
                <div class="team-name">${m.home_team}</div>
                <div class="team-badge">HOME</div>
              </div>
              <div class="score-display">
                <div class="score-box football">${p.predicted_home}</div>
                <span class="score-sep">–</span>
                <div class="score-box football">${p.predicted_away}</div>
              </div>
              <div class="team away">
                ${m.away_team_logo
                  ? `<img class="team-logo" src="${m.away_team_logo}" alt="${m.away_team}" onerror="this.style.display='none'">`
                  : `<div class="team-logo-placeholder">⚽</div>`}
                <div class="team-name">${m.away_team}</div>
                <div class="team-badge">AWAY</div>
              </div>
            </div>

            ${probBar(p.win_probability, p.draw_probability, p.loss_probability)}

            <div class="stats-row">
              <div class="stat-chip">xG Home <strong>${p.expected_home}</strong></div>
              <div class="stat-chip">xG Away <strong>${p.expected_away}</strong></div>
              <div class="stat-chip">Atk <strong>${f?.home_attack ?? '—'}</strong> vs Def <strong>${f?.away_defence ?? '—'}</strong></div>
              ${f?.h2h_matches > 0 ? `<div class="stat-chip">H2H <strong>${f.h2h_matches} games</strong></div>` : ''}
            </div>

            <div class="scorelines-safe-row">
              <div class="scorelines-col">
                <div class="scoreline-label">MOST LIKELY SCORELINES</div>
                <div class="scorelines">
                  ${(p.top_scorelines || []).map((s, idx) =>
                    `<div class="scoreline-chip ${idx===0?'top':''}">${s.scoreline} <span style="opacity:.6">${s.probability}%</span></div>`
                  ).join('')}
                </div>
                <div style="margin-top:10px;">
                  <span class="confidence-badge">🎯 ${p.confidence}% confidence</span>
                </div>
              </div>
              ${(() => {
                const sb = p.safe_bet;
                if (!sb) return '';
                const lastH2H = m.h2h && m.h2h.length > 0 ? m.h2h[0] : null;
                const lastH2HHtml = lastH2H ? `
                  <div class="safe-bet-last-h2h">
                    Last meeting<br>
                    <strong>${lastH2H.home_team} ${lastH2H.home_goals}–${lastH2H.away_goals} ${lastH2H.away_team}</strong>
                  </div>` : '';
                return `
                <div class="safe-bet-col">
                  <div class="safe-bet-label">SAFE BET</div>
                  <div class="safe-bet-line">Over ${sb.line}</div>
                  <div class="safe-bet-prob">${sb.probability}% probability</div>
                  ${lastH2HHtml}
                </div>`;
              })()}
            </div>

            <!-- Form + H2H -->
            <div class="form-h2h-section">
              <div class="form-h2h-grid">
                <div class="form-block">
                  <h4>${m.home_team} — Last 5</h4>
                  <div class="form-dots">${buildFormDots(m.home_form)}</div>
                </div>
                <div class="form-block">
                  <h4>${m.away_team} — Last 5</h4>
                  <div class="form-dots">${buildFormDots(m.away_form)}</div>
                </div>
              </div>
              <div class="h2h-block">
                <h4>Head to Head — Last 5</h4>
                ${buildH2H(m.h2h, m.home_team, m.away_team, p, f)}
              </div>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  // ── Render Team Schedule ──────────────────────────────────────────────────
  function renderTeamScheduleLoading(name) {
    document.getElementById('teamScheduleWrap').innerHTML = `
      <div class="team-schedule-wrap">
        <h2><button class="back-btn" onclick="backToLeague()">◄ Back</button> ${name}</h2>
        <div class="state-box"><div class="spinner"></div><h3>Loading schedule…</h3></div>
      </div>`;
  }

  function renderTeamSchedule(name, matches) {
    const completed = matches.filter(m => m.completed).sort((a,b) => b.date.localeCompare(a.date));
    const upcoming  = matches.filter(m => !m.completed).sort((a,b) => a.date.localeCompare(b.date));

    const teamId = JSON.parse(document.getElementById('teamSelect').value || '{}').id;

    function resultClass(m, tid) {
      if (!tid) return '';
      const isHome = m.home_team_id === tid;
      const gf = isHome ? m.home_goals : m.away_goals;
      const ga = isHome ? m.away_goals : m.home_goals;
      return formResult(gf, ga);
    }

    function completedRow(m) {
      const rc = resultClass(m, teamId);
      const score = m.home_goals !== undefined ? `${m.home_goals}–${m.away_goals}` : '—';
      return `
        <div class="schedule-row">
          <span class="sr-date">${formatShortDate(m.date)}</span>
          <span class="sr-teams">${m.home_team} <span style="color:var(--muted)">vs</span> ${m.away_team}</span>
          <span class="sr-score">${score}</span>
          <span class="sr-result ${rc}">${rc || '—'}</span>
        </div>`;
    }

    function upcomingRow(m) {
      const pred = m.prediction;
      const scoreStr = pred ? `${pred.predicted_home}–${pred.predicted_away}` : 'TBD';
      return `
        <div class="schedule-row">
          <span class="sr-date">${formatShortDate(m.date)} ${formatTime(m.date)}</span>
          <span class="sr-teams">${m.home_team} <span style="color:var(--muted)">vs</span> ${m.away_team}</span>
          <span class="sr-score" style="color:var(--accent)">${scoreStr}</span>
          <span class="sr-result upcoming">PRED</span>
        </div>`;
    }

    document.getElementById('teamScheduleWrap').innerHTML = `
      <div class="team-schedule-wrap">
        <h2><button class="back-btn" onclick="backToLeague()">◄ Back</button> ${name}</h2>

        ${upcoming.length ? `
          <div class="schedule-section-label">Upcoming Fixtures & Predictions (${upcoming.length})</div>
          ${upcoming.map(upcomingRow).join('')}
        ` : ''}

        ${completed.length ? `
          <div class="schedule-section-label">Recent Results (${completed.length})</div>
          ${completed.map(completedRow).join('')}
        ` : '<div class="state-box"><div class="icon">📋</div><h3>No results yet</h3></div>'}
      </div>`;
  }

  function backToLeague() {
    document.getElementById('teamSelect').value = '';
    document.getElementById('teamScheduleWrap').style.display = 'none';
    document.getElementById('footballGrid').style.display = '';
  }

  // ── Render Basketball ─────────────────────────────────────────────────────
  function renderBasketball(matches) {
    const grid = document.getElementById('basketballGrid');
    if (!matches.length) { setEmpty('basketballGrid', 'basketball', 'today'); return; }

    grid.innerHTML = matches.map((m, i) => {
      const p     = m.prediction;
      const f     = m.features;
      const delay = i * 0.05;

      return `
        <div class="match-card" style="animation-delay:${delay}s;cursor:pointer" onclick="openMatchModal('${m.game_id}')">
          <div class="card-header">
            <span class="league-name">🏀 NBA</span>
            <span class="match-time">${m.status || 'Today'}</span>
          </div>
          <div class="card-body">
            <div class="score-row">
              <div class="team home">
                <div class="team-name">${m.home_team}</div>
                <div class="team-badge">${m.home_abbr || 'HOME'}</div>
              </div>
              <div class="score-display">
                <div class="score-box basketball">${p.predicted_home}</div>
                <span class="score-sep">–</span>
                <div class="score-box basketball">${p.predicted_away}</div>
              </div>
              <div class="team away">
                <div class="team-name">${m.away_team}</div>
                <div class="team-badge">${m.away_abbr || 'AWAY'}</div>
              </div>
            </div>

            ${probBar(p.win_probability, undefined, p.loss_probability)}

            <div class="stats-row">
              <div class="stat-chip">Home range <strong>${p.home_range}</strong></div>
              <div class="stat-chip">Away range <strong>${p.away_range}</strong></div>
              <div class="stat-chip">Margin <strong>${p.predicted_margin > 0 ? '+' : ''}${p.predicted_margin}</strong></div>
              <div class="stat-chip">ORtg <strong>${f?.home_off_rating?.toFixed(2) ?? '—'}</strong></div>
              <div class="stat-chip">DRtg <strong>${f?.home_def_rating?.toFixed(2) ?? '—'}</strong></div>
              ${f?.h2h_matches > 0 ? `<div class="stat-chip">H2H <strong>${f.h2h_matches} games</strong></div>` : ''}
            </div>

            <div style="margin-top:4px;">
              <span class="confidence-badge">🎯 ${p.confidence}% confidence</span>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  // ── Flashcard Carousel ────────────────────────────────────────────────────
  let flashcardData    = [];
  let flashcardIndex   = 0;
  let flashcardTimer   = null;

  const ALL_LEAGUES = [
    'Premier League','Championship','La Liga','Serie A',
    'Bundesliga','Ligue 1','Champions League','Europa League'
  ];

  async function loadFlashcards() {
    const today = formatISO(new Date());
    const results = await Promise.allSettled(
      ALL_LEAGUES.map(lg =>
        fetch(`/api/predictions/football?league=${encodeURIComponent(lg)}&date=${today}`)
          .then(r => r.json()).then(d => d.matches || [])
      )
    );
    const all = results.flatMap(r => r.status === 'fulfilled' ? r.value : []);
    // Shuffle
    flashcardData = all.sort(() => Math.random() - 0.5);
    flashcardIndex = 0;
    renderFlashcards();
  }

  function renderFlashcards() {
    const wrap = document.getElementById('flashcardWrap');
    if (!flashcardData.length) {
      wrap.innerHTML = '<div class="flashcard-empty">No upcoming matches found across leagues</div>';
      return;
    }
    const cards = flashcardData.map((m, i) => {
      const p = m.prediction;
      return `
        <div class="flashcard ${i === 0 ? 'active' : ''}" data-idx="${i}" onclick="goToFlashcard(${i})">
          <div class="flashcard-league">⚽ ${m.league}</div>
          <div class="flashcard-time">${formatTime(m.match_time)}</div>
          <div class="flashcard-team home">
            ${m.home_team_logo ? `<img src="${m.home_team_logo}" style="width:32px;height:32px;object-fit:contain;margin-bottom:6px;display:block" onerror="this.style.display='none'">` : ''}
            ${m.home_team}
          </div>
          <div class="flashcard-score-block">
            <div class="flashcard-score">${p.predicted_home} – ${p.predicted_away}</div>
            <div class="flashcard-label">PREDICTED SCORE</div>
          </div>
          <div class="flashcard-team away">
            ${m.away_team_logo ? `<img src="${m.away_team_logo}" style="width:32px;height:32px;object-fit:contain;margin-bottom:6px;display:block;margin-left:auto" onerror="this.style.display='none'">` : ''}
            ${m.away_team}
          </div>
        </div>`;
    }).join('');
    const dots = flashcardData.map((_, i) =>
      `<div class="flashcard-dot ${i === 0 ? 'active' : ''}" id="fdot-${i}"></div>`
    ).join('');
    wrap.innerHTML = cards + `<div class="flashcard-dots">${dots}</div>`;

    if (flashcardTimer) clearInterval(flashcardTimer);
    flashcardTimer = setInterval(advanceFlashcard, 4000);
  }

  function advanceFlashcard() {
    if (!flashcardData.length) return;
    const next = (flashcardIndex + 1) % flashcardData.length;
    showFlashcard(next);
  }

  function showFlashcard(idx) {
    document.querySelectorAll('.flashcard').forEach((el, i) => {
      el.classList.toggle('active', i === idx);
    });
    document.querySelectorAll('.flashcard-dot').forEach((el, i) => {
      el.classList.toggle('active', i === idx);
    });
    flashcardIndex = idx;
  }

  function goToFlashcard(idx) {
    const m = flashcardData[idx];
    if (!m) return;
    // Switch to correct league and date, then scroll to match
    const leagueSelect = document.getElementById('leagueSelect');
    leagueSelect.value = m.league.replace('English ', '').replace('German ', '');
    // Try to match league name to dropdown option
    for (const opt of leagueSelect.options) {
      if (m.league.includes(opt.value) || opt.value.includes(m.league.split(' ')[1] || '')) {
        leagueSelect.value = opt.value; break;
      }
    }
    selectedDate = new Date(m.match_time || new Date());
    selectedDate.setHours(12, 0, 0, 0);
    renderCalendar();
    loadPredictions().then(() => {
      // Scroll to the matching card after render
      setTimeout(() => {
        const cards = document.querySelectorAll('.match-card');
        for (const card of cards) {
          if (card.textContent.includes(m.home_team) && card.textContent.includes(m.away_team)) {
            card.scrollIntoView({ behavior: 'smooth', block: 'center' });
            card.style.outline = '2px solid var(--accent)';
            setTimeout(() => card.style.outline = '', 2000);
            break;
          }
        }
      }, 500);
    });
  }

  // ── Match Detail Modal ────────────────────────────────────────────────────
  let _allMatches = {};  // fixture_id / game_id → match data

  function openMatchModal(id) {
    const m = _allMatches[id];
    if (!m) return;
    const modal = document.getElementById('matchModal');
    const panel = document.getElementById('modalPanel');
    panel.innerHTML = renderModalContent(m);
    modal.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeMatchModal() {
    document.getElementById('matchModal').classList.remove('open');
    document.body.style.overflow = '';
  }

  // Close on backdrop click
  document.getElementById('matchModal').addEventListener('click', e => {
    if (e.target === document.getElementById('matchModal')) closeMatchModal();
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeMatchModal(); });

  function renderModalContent(m) {
    const isBball = m.sport === 'basketball';
    const p = m.prediction;
    const f = m.features;
    const sport = isBball ? 'basketball' : 'football';
    const sportIcon = isBball ? '🏀' : '⚽';

    // ── Header ──
    const leagueRow = `
      <div class="modal-league-row">
        <span>${sportIcon} ${m.league || 'NBA'}</span>
        ${m.match_time ? `<span>·</span><span>${formatTime(m.match_time)}</span>` : ''}
        ${m.status ? `<span>·</span><span>${m.status}</span>` : m.status_bball ? `<span>·</span><span>${m.status_bball}</span>` : ''}
        ${m.venue ? `<span class="modal-venue">📍 ${m.venue}</span>` : ''}
      </div>`;

    const homeLogo = m.home_team_logo
      ? `<img src="${m.home_team_logo}" alt="${m.home_team}" onerror="this.style.display='none'">`
      : `<span style="font-size:40px">${sportIcon}</span>`;
    const awayLogo = m.away_team_logo
      ? `<img src="${m.away_team_logo}" alt="${m.away_team}" onerror="this.style.display='none'">`
      : `<span style="font-size:40px">${sportIcon}</span>`;

    const teamsRow = `
      <div class="modal-teams-row">
        <div class="modal-team">
          ${homeLogo}
          <div class="modal-team-name">${m.home_team}</div>
          <div class="modal-team-badge">${isBball ? (m.home_abbr || 'HOME') : 'HOME'}</div>
        </div>
        <div class="modal-score-center">
          <div class="modal-score-boxes">
            <div class="modal-score-box ${sport}">${p.predicted_home}</div>
            <span class="modal-score-sep">–</span>
            <div class="modal-score-box ${sport}">${p.predicted_away}</div>
          </div>
          <div class="modal-status">Predicted score</div>
          ${(m.is_final || m.is_live) && m.home_goals != null ? `
            <div style="margin-top:6px;font-size:12px;color:var(--subtext)">
              Actual: <strong style="color:var(--text)">${m.home_goals}–${m.away_goals}</strong>
              ${m.is_live ? `<span style="color:var(--red);font-weight:700"> LIVE</span>` : ''}
            </div>` : ''}
        </div>
        <div class="modal-team">
          ${awayLogo}
          <div class="modal-team-name">${m.away_team}</div>
          <div class="modal-team-badge">${isBball ? (m.away_abbr || 'AWAY') : 'AWAY'}</div>
        </div>
      </div>`;

    // ── Half Time section (football only) ──
    let htSection = '';
    if (!isBball) {
      const hasActualHT = m.home_goals_ht != null && m.away_goals_ht != null;
      const hasPredHT   = p.predicted_home_ht != null && p.predicted_away_ht != null;
      htSection = `
        <div class="ht-section">
          <div class="ht-section-title">⏱ HALF TIME</div>
          <div class="ht-row">
            <div class="ht-col">
              <div class="ht-col-label">ACTUAL HT SCORE</div>
              ${hasActualHT ? `
                <div class="ht-score-row">
                  <div class="ht-score-box actual">${m.home_goals_ht}</div>
                  <span class="ht-sep">–</span>
                  <div class="ht-score-box actual">${m.away_goals_ht}</div>
                </div>` : `<div class="ht-na">Not yet available</div>`}
            </div>
            <div class="ht-col">
              <div class="ht-col-label">PREDICTED HT SCORE</div>
              ${hasPredHT ? `
                <div class="ht-score-row">
                  <div class="ht-score-box pred">${p.predicted_home_ht}</div>
                  <span class="ht-sep">–</span>
                  <div class="ht-score-box pred">${p.predicted_away_ht}</div>
                </div>` : `<div class="ht-na">—</div>`}
            </div>
          </div>
        </div>`;
    }

    // ── Prob bar ──
    const bar = isBball
      ? probBar(p.win_probability, undefined, p.loss_probability)
      : probBar(p.win_probability, p.draw_probability, p.loss_probability);

    // ── Stats ──
    let statsHtml = '';
    if (!isBball) {
      statsHtml = `
        <div class="modal-body-section">
          <div class="modal-section-title">Stats</div>
          <div class="stats-row">
            <div class="stat-chip">xG Home <strong>${p.expected_home}</strong></div>
            <div class="stat-chip">xG Away <strong>${p.expected_away}</strong></div>
            <div class="stat-chip">Atk <strong>${f?.home_attack ?? '—'}</strong> vs Def <strong>${f?.away_defence ?? '—'}</strong></div>
            ${f?.h2h_matches > 0 ? `<div class="stat-chip">H2H <strong>${f.h2h_matches} games</strong></div>` : ''}
          </div>
        </div>`;
    } else {
      statsHtml = `
        <div class="modal-body-section">
          <div class="modal-section-title">Stats</div>
          <div class="stats-row">
            <div class="stat-chip">Home range <strong>${p.home_range}</strong></div>
            <div class="stat-chip">Away range <strong>${p.away_range}</strong></div>
            <div class="stat-chip">Margin <strong>${p.predicted_margin > 0 ? '+' : ''}${p.predicted_margin}</strong></div>
            <div class="stat-chip">ORtg <strong>${f?.home_off_rating?.toFixed(2) ?? '—'}</strong></div>
            <div class="stat-chip">DRtg <strong>${f?.home_def_rating?.toFixed(2) ?? '—'}</strong></div>
          </div>
        </div>`;
    }

    // ── Scorelines + safe bet (football) ──
    let scorelineSection = '';
    if (!isBball) {
      const sb = p.safe_bet;
      const lastH2H = m.h2h && m.h2h.length > 0 ? m.h2h[0] : null;
      scorelineSection = `
        <div class="modal-body-section">
          <div class="scorelines-safe-row">
            <div class="scorelines-col">
              <div class="scoreline-label">MOST LIKELY SCORELINES</div>
              <div class="scorelines">
                ${(p.top_scorelines || []).map((s, idx) =>
                  `<div class="scoreline-chip ${idx===0?'top':''}">${s.scoreline} <span style="opacity:.6">${s.probability}%</span></div>`
                ).join('')}
              </div>
              <div style="margin-top:10px;">
                <span class="confidence-badge">🎯 ${p.confidence}% confidence</span>
              </div>
            </div>
            ${sb ? `
            <div class="safe-bet-col">
              <div class="safe-bet-label">SAFE BET</div>
              <div class="safe-bet-line">Over ${sb.line}</div>
              <div class="safe-bet-prob">${sb.probability}% probability</div>
              ${lastH2H ? `
                <div class="safe-bet-last-h2h">
                  Last meeting<br>
                  <strong>${lastH2H.home_team} ${lastH2H.home_goals}–${lastH2H.away_goals} ${lastH2H.away_team}</strong>
                </div>` : ''}
            </div>` : ''}
          </div>
        </div>`;
    } else {
      scorelineSection = `
        <div class="modal-body-section">
          <span class="confidence-badge">🎯 ${p.confidence}% confidence</span>
        </div>`;
    }

    // ── Form + H2H (football) ──
    let formH2H = '';
    if (!isBball && (m.home_form || m.away_form || m.h2h)) {
      formH2H = `
        <div class="form-h2h-section">
          <div class="form-h2h-grid">
            <div class="form-block">
              <h4>${m.home_team} — Last 5</h4>
              <div class="form-dots">${buildFormDots(m.home_form)}</div>
            </div>
            <div class="form-block">
              <h4>${m.away_team} — Last 5</h4>
              <div class="form-dots">${buildFormDots(m.away_form)}</div>
            </div>
          </div>
          <div class="h2h-block">
            <h4>Head to Head — Last 5</h4>
            ${buildH2H(m.h2h, m.home_team, m.away_team, p, f)}
          </div>
        </div>`;
    }

    return `
      <button class="modal-close" onclick="closeMatchModal()" title="Close">✕</button>
      ${leagueRow}
      ${teamsRow}
      ${htSection}
      ${bar}
      ${statsHtml}
      ${scorelineSection}
      ${formH2H}
    `;
  }

  // ── Live Score Ticker ─────────────────────────────────────────────────────
  let _tickerScores = [];

  function _fillTrack(trackEl, items, emptyMsg) {
    if (!trackEl) return;
    if (!items.length) {
      trackEl.innerHTML = `<span class="ticker-item"><span class="t-league">${emptyMsg}</span></span>`;
      trackEl.innerHTML += trackEl.innerHTML;
      return;
    }
    const sportIcon = s => s === 'basketball' ? '🏀' : '⚽';
    const html = items.map(s => `<span class="ticker-item">
      <span class="t-sport">${sportIcon(s.sport)}</span>
      <span class="t-league">${s.league}</span>
      <span>${s.home_team}</span>
      <span class="t-score${s.is_live ? ' live' : ''}">${s.home_score ?? '–'}–${s.away_score ?? '–'}</span>
      <span>${s.away_team}</span>
      ${s.is_live ? `<span class="t-status">● ${s.status || 'LIVE'}</span>` : `<span class="t-ft">FT</span>`}
    </span>`).join('');
    trackEl.innerHTML = html + html; // duplicate for seamless loop
  }

  function refreshTickerDisplay() {
    const sport = currentSport; // 'football' or 'basketball'
    const filtered = _tickerScores.filter(s => s.sport === sport);
    const live  = filtered.filter(s => s.is_live);
    const final = filtered.filter(s => s.is_final);
    _fillTrack(document.getElementById('tickerTrackLive'),  live,  'No live games right now');
    _fillTrack(document.getElementById('tickerTrackFinal'), final, 'No results yet today');
  }

  async function loadLiveTicker() {
    try {
      const res = await fetch('/api/live-scores');
      if (!res.ok) return;
      const data = await res.json();
      _tickerScores = data.scores || [];
      refreshTickerDisplay();
    } catch (e) {
      console.warn('Ticker error:', e);
    }
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  fetchFixtureDates();  // also calls renderCalendar() when done
  loadPredictions();
  loadFlashcards();
  loadLiveTicker();
  setInterval(loadPredictions, 30 * 60 * 1000);
  setInterval(loadLiveTicker, 60 * 1000);
</script>

<!-- Match Detail Modal -->
<div id="matchModal" role="dialog" aria-modal="true">
  <div class="modal-panel" id="modalPanel"></div>
</div>

<!-- Score Tickers -->
<div id="tickerContainer">
  <div class="ticker-row" id="tickerLive">
    <div class="ticker-label live">🔴 LIVE</div>
    <div class="ticker-track-wrap">
      <div class="ticker-track" id="tickerTrackLive">
        <span class="ticker-item"><span class="t-league">Loading…</span></span>
      </div>
    </div>
  </div>
  <div class="ticker-row" id="tickerFinal">
    <div class="ticker-label final">✅ FINAL</div>
    <div class="ticker-track-wrap">
      <div class="ticker-track" id="tickerTrackFinal">
        <span class="ticker-item"><span class="t-league">Loading…</span></span>
      </div>
    </div>
  </div>
</div>

</body>
</html>
